<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haystack</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Outfit:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #f9e6b6;
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .logo-wrap {
      opacity: 0;
      transform: translateY(18px);
      animation: rise 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    .logo-wrap img {
      width: min(680px, 90vw);
      display: block;
      border-radius: 3px;
    }

    .contact-wrap {
      margin-top: 38px;
      opacity: 0;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.75s forwards;
    }

    .contact-link {
      font-family: 'Outfit', sans-serif;
      font-size: 0.72rem;
      font-weight: 200;
      letter-spacing: 0.35em;
      
      color: #9a7d3a;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      padding-bottom: 2px;
      transition: border-color 0.3s ease, color 0.3s ease;
    }

    .contact-link:hover {
      color: #7a5f22;
      border-bottom-color: #c9a84c;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
